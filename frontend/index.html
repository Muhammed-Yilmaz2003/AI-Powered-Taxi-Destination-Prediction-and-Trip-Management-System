<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Taxi Trip Management Workspace</title>
    <!--CSS-->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!--Loading Overlay for Backend Startup-->
    <div id="loading-overlay">
        <div class="loading-content">
            <div class="spinner"></div>
            <h2 id="loading-text">Connecting To The Backend...</h2>
      
            <div class="tech-stack-badges">
                <span class="badge python-badge"><img src="https://cdn.simpleicons.org/python/white" class="badge-icon"> Python</span>
                <span class="badge fastapi-badge"><img src="https://cdn.simpleicons.org/fastapi/white" class="badge-icon"> FastAPI</span>
                <span class="badge ml-badge"><img src="https://cdn.simpleicons.org/scikitlearn/white" class="badge-icon"> ML / XGBoost</span>
                <span class="badge render-badge"><img src="https://cdn.simpleicons.org/render/black" class="badge-icon"> Render</span>
                <span class="badge vercel-badge"><img src="https://cdn.simpleicons.org/vercel/white" class="badge-icon"> Vercel</span>
            </div>

            <p id="loading-error" style="display: none;"></p>
        </div>
    </div>
    <!--Main Application-->
    <div id="main-app" style="display: none;">
        <!--Map UI-->
        <div id="map"></div>
        <!--Taxi Trip Management Dashboard-->
        <div class="dashboard">
            <div class="header-row">
                <h2>SF Taxi Operations</h2>
                <button id="themeToggle">🌙 Dark Mode</button>
            </div>
            <p>Live ML spatial accuracy target: <strong>~2.04km model error</strong></p>
            <div style="flex: 1; overflow-y: auto;">
                <table id="logTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Coordinates</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="logBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <!--Scripts-->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
